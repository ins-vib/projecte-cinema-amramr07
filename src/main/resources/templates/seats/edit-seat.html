<div th:replace="~{layout-admin :: layout(~{::content})}">
<div th:fragment="content">

<h1>Edit Seat</h1>
<form th:action="@{/seat/delete/{id}(id=${seat.id})}" method="post">
    <button type="submit"
            onclick="return confirm('Are you sure you want to delete this seat?')">
        Delete
    </button>
</form>

<form th:action="@{/seat/edit}" th:object="${seat}" method="post">
    <input type="hidden" th:field="*{id}" />
    
    <label>Row:</label>
    <input type="number" th:field="*{seatRow}" /><br/>

    <label>Number:</label>
    <input type="number" th:field="*{seatNumber}" /><br/>

    <label>PosX:</label>
    <input type="number" th:field="*{posX}" /><br/>

    <label>PosY:</label>
    <input type="number" th:field="*{posY}" /><br/>

    <label>Type:</label>
    <select th:field="*{type}">
        <option th:each="t : ${types}"
        th:value="${t}"
        th:text="${t}">
            
        </option>
    </select><br/>

    <label>Active:</label>
    <input type="checkbox" th:field="*{active}" /><br/><br/>

    <button type="submit">Save</button>
</form>

<a th:href="@{/room/{id}/seats(id=${seat.room.id})}">Back to room</a>

</div>
</div>
