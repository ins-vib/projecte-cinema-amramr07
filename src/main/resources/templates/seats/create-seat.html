<div th:replace="~{layout-admin :: layout(~{::content})}">
<div th:fragment="content">

<h1>Add Seat to <span th:text="${room.name}"></span></h1>

<form th:action="@{/seat/create}" th:object="${seat}" method="post">
    <input type="hidden" name="roomId" th:value="${room.id}" />

    <label>Row:</label>
    <input type="number" th:field="*{seatRow}" /><br/>

    <label>Number:</label>
    <input type="number" th:field="*{seatNumber}" /><br/>

    <label>PosX:</label>
    <input type="number" th:field="*{posX}" /><br/>

    <label>PosY:</label>
    <input type="number" th:field="*{posY}" /><br/>

    <label>Type:</label>
    <select th:field="*{type}">
        <option th:each="t : ${T(com.daw.CinemaDaw.domain.cinema.SeatType).values()}"
                th:value="${t}" th:text="${t}"></option>
    </select><br/>

    <label>Active:</label>
    <input type="checkbox" th:field="*{active}" /><br/><br/>

    <button type="submit">Save</button>
</form>

<a th:href="@{/room/{id}/seats(id=${room.id})}">Back to room</a>

</div>
</div>
