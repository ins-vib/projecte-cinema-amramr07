<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout-public :: layout(~{::content})}">
    <div th:fragment="content">

        <h1>Create Account</h1>

        <p th:if="${errorMessage}" th:text="${errorMessage}" style="color:red;"></p>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <div>
                <label for="username">Username</label>
                <input type="text"
                       id="username"
                       th:field="*{username}"
                       placeholder="your username"
                       autocomplete="username"
                       required />
                <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color:red;"></div>
            </div>

            <div>
                <label for="email">Email</label>
                <input type="email"
                       id="email"
                       name="email"
                       placeholder="email@example.com"
                       autocomplete="email" />
            </div>

            <div>
                <label for="password">Password</label>
                <input type="password"
                       id="password"
                       th:field="*{password}"
                       placeholder="minimum 4 characters"
                       autocomplete="new-password"
                       required />
                <p>Password tip: use a mix of letters and numbers.</p>
                <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red;"></div>
            </div>

            <div>
                <label for="confirmPassword">Confirm Password</label>
                <input type="password"
                       id="confirmPassword"
                       name="confirmPassword"
                       placeholder="repeat your password"
                       autocomplete="new-password"
                       required />
            </div>

            <input type="hidden" name="role" value="CLIENT" />

            <button type="submit">Create Account</button>
        </form>

        <br>
        <p>Already have an account? <a th:href="@{/login}">Sign in</a></p>
        <a th:href="@{/}">Back to home</a>

    </div>
</div>
</body>
</html>
