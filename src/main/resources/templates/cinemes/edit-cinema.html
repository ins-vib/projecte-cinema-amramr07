<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Cinema</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <h1>Editar Cinema</h1>

   <form th:action="@{/edit/cinema}" th:object="${cinema}" method="post">

<input type="hidden" th:field="*{id}" />

<label>Nom:</label>
<input type="text" th:field="*{name}" />
<div th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>

<label>Adreça:</label>
<input type="text" th:field="*{adress}" />
<div th:if="${#fields.hasErrors('adress')}" th:errors="*{adress}"></div>

<label>Ciutat:</label>
<input type="text" th:field="*{city}" />
<div th:if="${#fields.hasErrors('city')}" th:errors="*{city}"></div>

<label>Codi Postal:</label>
<input type="text" th:field="*{postalCode}" />
<div th:if="${#fields.hasErrors('postalCode')}" th:errors="*{postalCode}"></div>

<button type="submit">Guardar</button>
<a href="/cinemes">Tornar enrere</a>
</form>

</body>
</html>
