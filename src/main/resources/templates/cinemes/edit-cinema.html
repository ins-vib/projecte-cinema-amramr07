<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Cinema</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <h1>Editar Cinema</h1>

    <form th:action="@{/edit/cinema}" th:object="${cinema}" method="post">
        <div>
            <input type="text" th:field="*{id}" /> <br><br>
            <label>Nom:</label>
            <input type="text" th:field="*{name}" /> <br><br>
        </div>
        <div>
            <label>Adreça:</label>
            <input type="text" th:field="*{adress}" /><br><br>
        </div>
        <div>
            <label>Ciutat:</label>
            <input type="text" th:field="*{city}" /><br><br>
        </div>
        <div>
            <label>Codi Postal:</label>
            <input type="text" th:field="*{postalCode}" /><br><br>
        </div>

        <button type="submit">Guardar</button>
        <a href="/cinemes">Tornar enrere</a>
    </form>

</body>
</html>
