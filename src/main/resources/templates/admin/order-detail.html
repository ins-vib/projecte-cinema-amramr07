<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout-admin :: layout(~{::content})}">
    <div th:fragment="content">
        <h1>Order Details</h1>

        <p><strong>ID:</strong> <span th:text="${order.id}"></span></p>
        <p><strong>Customer:</strong> <span th:text="${order.clientName}"></span></p>
        <p><strong>Email:</strong> <span th:text="${order.clientEmail}"></span></p>
        <p>
            <strong>Purchase date:</strong>
            <span th:text="${order.orderDateTime != null ? #temporals.format(order.orderDateTime, 'dd/MM/yyyy HH:mm') : '-'}"></span>
        </p>
        <p><strong>Status:</strong> <span th:text="${order.status}"></span></p>
        <p><strong>Subtotal:</strong> <span th:text="${#numbers.formatDecimal(order.subtotalAmount, 1, 2)} + ' €'"></span></p>
        <p><strong>Discount:</strong> <span th:text="${#numbers.formatDecimal(order.discountAmount, 1, 2)} + ' €'"></span></p>
        <p><strong>Total:</strong> <span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)} + ' €'"></span></p>
        <p th:if="${order.appliedCouponCode != null}">
            <strong>Applied coupon:</strong> <span th:text="${order.appliedCouponCode}"></span>
        </p>
        <p th:if="${order.generatedCouponCode != null}">
            <strong>Generated coupon:</strong> <span th:text="${order.generatedCouponCode}"></span>
        </p>

        <h2>Order Tickets</h2>

        <p th:if="${#lists.isEmpty(order.tickets)}">This order has no associated tickets.</p>

        <table th:if="${not #lists.isEmpty(order.tickets)}" border="1">
            <thead>
                <tr>
                    <th>Ticket</th>
                    <th>Movie</th>
                    <th>Cinema</th>
                    <th>Room</th>
                    <th>Screening</th>
                    <th>Row</th>
                    <th>Seat</th>
                    <th>Price</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="ticket : ${order.tickets}">
                    <td th:text="${ticket.id}"></td>
                    <td th:text="${ticket.screening.movie.title}"></td>
                    <td th:text="${ticket.screening.room.cinema.name}"></td>
                    <td th:text="${ticket.screening.room.name}"></td>
                    <td th:text="${#temporals.format(ticket.screening.screeningDateTime, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${ticket.seat.seatRow}"></td>
                    <td th:text="${ticket.seat.seatNumber}"></td>
                    <td th:text="${#numbers.formatDecimal(ticket.price, 1, 2)} + ' €'"></td>
                </tr>
            </tbody>
        </table>

        <br>
        <a th:href="@{/admin/orders}">Back to list</a>
    </div>
</div>
</body>
</html>
