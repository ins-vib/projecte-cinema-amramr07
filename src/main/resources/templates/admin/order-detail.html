<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout :: layout(~{::content})}">
    <div th:fragment="content">
        <h1>Detall de la comanda</h1>

        <p><strong>ID:</strong> <span th:text="${order.id}"></span></p>
        <p><strong>Client:</strong> <span th:text="${order.clientName}"></span></p>
        <p><strong>Email:</strong> <span th:text="${order.clientEmail}"></span></p>
        <p>
            <strong>Data de compra:</strong>
            <span th:text="${order.orderDateTime != null ? #temporals.format(order.orderDateTime, 'dd/MM/yyyy HH:mm') : '-'}"></span>
        </p>
        <p><strong>Estat:</strong> <span th:text="${order.status}"></span></p>
        <p><strong>Total:</strong> <span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)} + ' €'"></span></p>

        <h2>Entrades de la comanda</h2>

        <p th:if="${#lists.isEmpty(order.tickets)}">Aquesta comanda no té entrades associades.</p>

        <table th:if="${not #lists.isEmpty(order.tickets)}" border="1">
            <thead>
                <tr>
                    <th>Ticket</th>
                    <th>Pel·lícula</th>
                    <th>Cinema</th>
                    <th>Sala</th>
                    <th>Sessió</th>
                    <th>Fila</th>
                    <th>Seient</th>
                    <th>Preu</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="ticket : ${order.tickets}">
                    <td th:text="${ticket.id}"></td>
                    <td th:text="${ticket.screening.movie.title}"></td>
                    <td th:text="${ticket.screening.room.cinema.name}"></td>
                    <td th:text="${ticket.screening.room.name}"></td>
                    <td th:text="${#temporals.format(ticket.screening.screeningDateTime, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${ticket.seat.seatRow}"></td>
                    <td th:text="${ticket.seat.seatNumber}"></td>
                    <td th:text="${#numbers.formatDecimal(ticket.price, 1, 2)} + ' €'"></td>
                </tr>
            </tbody>
        </table>

        <br>
        <a th:href="@{/admin/orders}">Tornar al llistat</a>
    </div>
</div>
</body>
</html>
