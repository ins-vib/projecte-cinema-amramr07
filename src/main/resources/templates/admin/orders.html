<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout-admin :: layout(~{::content})}">
    <div th:fragment="content">
        <h1>Order List</h1>

        <p th:if="${#lists.isEmpty(orders)}">There are no orders yet.</p>

        <table th:if="${not #lists.isEmpty(orders)}" border="1">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Email</th>
                    <th>Date</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Tickets</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.id}"></td>
                    <td th:text="${order.clientName}"></td>
                    <td th:text="${order.clientEmail}"></td>
                    <td th:text="${order.orderDateTime != null ? #temporals.format(order.orderDateTime, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                    <td th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)} + ' €'"></td>
                    <td th:text="${order.status}"></td>
                    <td th:text="${#lists.size(order.tickets)}"></td>
                    <td>
                        <a th:href="@{/admin/orders/{id}(id=${order.id})}">View details</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <br>
        <a th:href="@{/home}">Back to panel</a>
    </div>
</div>
</body>
</html>
