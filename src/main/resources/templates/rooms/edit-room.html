<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout-admin :: layout(~{::content})}">
    <div th:fragment="content">

        <h1>Edit Room</h1>

        <form th:action="@{/room/edit}" th:object="${room}" method="post">

            <input type="hidden" th:field="*{id}">

            <div>
                <label>Name:</label>
                <input type="text" th:field="*{name}" />
                <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></div>
            </div>

            <br>

            <div>
                <label>Capacity:</label>
                <input type="number" th:field="*{capacity}" />
                <div th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}" style="color:red;"></div>
            </div>

            <br>

            <button type="submit">Save</button>
            <a th:href="@{/cinema/{id}(id=${room.cinema.id})}">Back</a>

        </form>

    </div>
</div>
</body>
</html>
