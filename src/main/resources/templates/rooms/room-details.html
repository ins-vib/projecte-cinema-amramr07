<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    

<body>

<div th:replace="~{layout-admin :: layout(~{::content})}">

<div th:fragment="content">

<h1 th:text="${room.name}"></h1>
<p>Capacity: <span th:text="${room.capacity}"></span></p>
<p>Cinema: <span th:text="${room.cinema.name}"></span></p>

<br>
<a th:href="@{/cinema/{id}(id=${room.cinema.id})}">Back to cinema</a>

</div>

</div>

</body>
</html>
