<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Seats for [[${room.name}]]</title>
    <style>
        .seats-grid {
            display: grid;
            grid-template-columns: repeat(10, 60px); 
            gap: 10px;
            justify-content: start;
        }
        .seat-item {
            text-align: center;
        }
        .seat {
            width: 52px;
            height: 52px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .seat:hover {
            transform: scale(1.1);
        }
        .seat-number {
            display: block;
            margin-top: 3px;
            font-size: 12px;
        }
        
        .STANDARD { color: gray; }
        .VIP { color: gold; }
        .DISABLED { color: red; }
        .seat.inactive { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>

<div th:replace="~{layout-admin :: layout(~{::content})}">
    <div th:fragment="content" style="width:100%;">

        <h1>Seats for <span th:text="${room.name}"></span></h1>
        <p>Total capacity: <strong th:text="${room.capacity}"></strong> seats</p>

        <a th:href="@{/seat/create(roomId=${room.id})}">New Seat</a>

        <table border="1" th:if="${not #lists.isEmpty(room.seats)}">
            <thead>
                <tr>
                    <th>Row</th>
                    <th>Seat</th>
                    <th>Type</th>
                    <th>Active</th>
                    <th>Pos X</th>
                    <th>Pos Y</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="seat : ${room.seats}">
                    <td th:text="${seat.seatRow}"></td>
                    <td th:text="${seat.seatNumber}"></td>
                    <td th:text="${seat.type}"></td>
                    <td th:text="${seat.active ? 'Yes' : 'No'}"></td>
                    <td th:text="${seat.posX}"></td>
                    <td th:text="${seat.posY}"></td>
                </tr>
            </tbody>
        </table>

        <div class="seats-grid">
    <div th:each="seat : ${room.seats}" class="seat-item">
        <a th:href="@{/seat/edit/{id}(id=${seat.id})}" th:classappend="${!seat.active} ? 'inactive'">
            <svg class="seat" th:class="${seat.type}" viewBox="0 0 491.5 491.5" xmlns="http://www.w3.org/2000/svg">
                <path d="M449.149,216.2v-99c0-64.7-53.4-117.2-119.1-117.2h-168.4
                         c-65.6,0-119.1,52.6-119.1,117.2v99
                         c-25,12.1-42.5,37.5-42.5,67.1v208.2h163.8V471h163.8v20.5h163.8V283.3
                         C491.649,253.7,474.149,228.2,449.149,216.2z
                         M122.949,307.2v41v102.4h-81.9V283.3
                         c0-16,11.2-29.4,26.2-32.8h0.2
                         c2.6-0.6,5-0.9,7.3-0.9h14.4
                         c18.6,0,33.8,15.1,33.8,33.8V307.2z
                         M327.749,348.1h-163.8v-41h163.8V348.1z
                         M368.749,450.5V348.1v-41v-23.9
                         c0-18.6,15.1-33.8,33.8-33.8h14.3
                         c2.3,0,4.7,0.3,7.3,0.9h0.2
                         c15,3.4,26.2,16.8,26.2,32.8v167.4H368.749z"
                      fill="currentColor"/>
            </svg>
        </a>
        <span class="seat-number" th:text="${seat.seatRow} + ',' + ${seat.seatNumber}"></span>
    </div>
</div>
        <br>
        <a th:href="@{/cinema/{id}(id=${room.cinema.id})}">Back to cinema</a>

    </div>
</div>

</body>
</html>
