<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6"
      lang="ca"
      th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <title>Cinex</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header>
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>CineX</h1>

        <!-- No autenticado: Login y Register -->
        <div sec:authorize="isAnonymous()">
            <a href="/login">Login</a>
            &nbsp;
            <a href="/register">Register</a>
        </div>

        <!-- Admin: nombre + logout -->
        <div sec:authorize="hasRole('ADMIN')">
            <span sec:authentication="name"></span> (Admin)
            &nbsp;
            <a href="/logout">Logout</a>
        </div>

        <!-- Client: nombre + logout -->
        <div sec:authorize="hasRole('CLIENT') and !hasRole('ADMIN')">
            <span sec:authentication="name"></span>
            &nbsp;
            <a href="/logout">Logout</a>
        </div>
    </div>

    <nav>
        <a href="/home">Home</a>

        <!-- Admin ve TODO igual que antes -->
        <span sec:authorize="hasRole('ADMIN')">
            <a href="/movies">Movies</a>
            <a href="/cinemes">Cinemes</a>
            <a href="/admin/orders">Comandes</a>
        </span>

        <!-- Cliente solo ve su apartado -->
        <span sec:authorize="hasRole('CLIENT') and !hasRole('ADMIN')">
            <a href="/client">Apartat Client</a>
        </span>
    </nav>
    <hr>
</header>

<main th:replace="${content}">
</main>

<footer>
    <hr>
    <p>DAW1 2026</p>
</footer>
</body>
</html>
