<form action="/client/reserve" method="post">
    <div th:each="seat : ${seats}">
        <label>
            <input type="checkbox" name="seatIds" th:value="${seat.id}">
            
            Fila: <span th:text="${seat.seatRow}"></span>
            Asiento: <span th:text="${seat.seatNumber}"></span>
        </label>
        <br>
    </div>

    <input type="hidden" name="screeningId" th:value="${screening.id}">
    <button type="submit">Reservar Asientos</button>
</form>
