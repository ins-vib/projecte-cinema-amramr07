<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout-client :: layout(~{::content})}">
<div th:fragment="content">

<div class="client-movie-page">
<h1>Available Movies</h1>

<div class="client-movie-grid">
    <a th:each="movie : ${movies}"
       th:href="@{/client/movie/{id}(id=${movie.id})}"
       class="client-movie-card">
        <div class="client-movie-poster">
            <img th:if="${movie.posterUrl != null and !#strings.isEmpty(movie.posterUrl)}"
                 th:src="${movie.posterUrl}"
                 th:alt="${movie.title}">
            <div th:unless="${movie.posterUrl != null and !#strings.isEmpty(movie.posterUrl)}"
                 class="client-movie-placeholder">
                <span>Image</span>
            </div>
        </div>

        <div class="client-movie-content">
            <h3 th:text="${movie.title}"></h3>
            <p th:text="${movie.genre}"></p>
            <p th:text="${movie.duration} + ' min'"></p>
        </div>
    </a>
</div>

</div>
</div>
</div>
</body>
</html>
