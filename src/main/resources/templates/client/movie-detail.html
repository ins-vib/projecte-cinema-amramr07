<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout-client :: layout(~{::content})}">
<div th:fragment="content">

<div class="client-movie-page">
<h1 th:text="${movie.title}"></h1>

<div class="client-movie-detail-hero">
    <div class="client-movie-detail-poster">
        <img th:if="${movie.posterUrl != null and !#strings.isEmpty(movie.posterUrl)}"
             th:src="${movie.posterUrl}"
             th:alt="${movie.title}">
        <div th:unless="${movie.posterUrl != null and !#strings.isEmpty(movie.posterUrl)}"
             class="client-movie-placeholder">
            <span>Imagen</span>
        </div>
    </div>

    <div class="client-movie-detail-info">
        <p><strong>Gènere:</strong> <span th:text="${movie.genre}"></span></p>
        <p><strong>Durada:</strong> <span th:text="${movie.duration}"></span> min</p>
        <p th:if="${movie.sinopsis != null and !#strings.isEmpty(movie.sinopsis)}">
            <strong>Sinopsi:</strong> <span th:text="${movie.sinopsis}"></span>
        </p>
    </div>
</div>

<div th:if="${#lists.isEmpty(screenings)}">
    <p>No hi ha sessions disponibles per aquesta pel·lícula.</p>
</div>

<div th:each="s : ${screenings}">
    <a th:href="@{/screenings/seats/{id}(id=${s.id})}">
        <p>
            Cine:
            <span th:text="${s.room.cinema.name}"></span> |
            Sala:
            <span th:text="${s.room.name}"></span> |
            Fecha:
            <span th:text="${#temporals.format(s.screeningDateTime, 'dd/MM/yyyy HH:mm')}"></span> |
            Precio:
            <span th:text="${s.price}"></span> €
        </p>
    </a>
</div>

<a href="/client">Volver</a>

</div>
</div>
</div>
</body>
</html>
