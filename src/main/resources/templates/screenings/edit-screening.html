<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout :: layout(~{::content})}">
<div th:fragment="content">

    <h1>Editar Sessió</h1>

    <form th:action="@{/screening/edit}" th:object="${screening}" method="post">
        <input type="hidden" th:field="*{id}">

        <div>
            <label>Data i Hora:</label>
            <input type="datetime-local" th:field="*{screeningDateTime}" />
            <br>
        </div>

        <div>
            <label>Sala:</label>
            <select name="roomId">
                <option th:each="room : ${rooms}"
                        th:value="${room.id}"
                        th:text="${room.cinema.name} + ' — ' + ${room.name}"
                        th:selected="${room.id == screening.room.id}">
                </option>
            </select>
            <br>
        </div>

        <div>
            <label>Preu (€):</label>
            <input type="number" step="0.01" min="0" th:field="*{price}" />
            <br>
        </div>

        <br>
        <button type="submit">Guardar</button>
        <a th:href="@{/movies/{id}(id=${screening.movie.id})}">Tornar enrere</a>
    </form>

</div>
</div>
</body>
</html>
