<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:replace="~{layout-admin :: layout(~{::content})}">
<div th:fragment="content">

    <h1 th:text="${movie.title}"></h1>
    <p><strong>Duration:</strong> <span th:text="${movie.duration}"></span> minutes</p>
    <p><strong>Genre:</strong> <span th:text="${movie.genre}"></span></p>
    <p><strong>Description:</strong> <span th:text="${movie.description}"></span></p>
    <p><strong>Release Date:</strong> <span th:text="${movie.releaseDate}"></span></p>

    <br>
    <hr>

    <h2>Screenings</h2>

    <p th:if="${screeningMessage}" th:text="${screeningMessage}" style="color:green;"></p>
    <p th:if="${screeningError}" th:text="${screeningError}" style="color:red;"></p>

    <a th:href="@{/screening/create(movieId=${movie.id})}"> Nova Sessió</a>

    <br><br>

    <div th:if="${#lists.isEmpty(screenings)}">
        <p>No hi ha sessions programades per aquesta pel·lícula.</p>
    </div>

    <table border="1" th:unless="${#lists.isEmpty(screenings)}">
        <thead>
            <tr>
                <th>Data i Hora</th>
                <th>Sala</th>
                <th>Cinema</th>
                <th>Preu</th>
                <th>Accions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="s : ${screenings}">
                <td th:text="${#temporals.format(s.screeningDateTime, 'dd/MM/yyyy HH:mm')}"></td>
                <td th:text="${s.room.name}"></td>
                <td th:text="${s.room.cinema.name}"></td>
                <td th:text="${s.price} + ' €'"></td>
                <td>
                    <a th:href="@{/screening/edit/{id}(id=${s.id})}">Editar</a>
                    &nbsp;
                    <form th:action="@{/screening/delete/{id}(id=${s.id})}" method="post" class="inline-action-form">
                        <button type="submit" class="table-action-button delete-action-button"
                                onclick="return confirm('Segur que vols esborrar aquesta sessió?')">Esborrar</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <br>
    <a th:href="@{/movies}">Back to list</a>

</div>
</div>
</body>
</html>
