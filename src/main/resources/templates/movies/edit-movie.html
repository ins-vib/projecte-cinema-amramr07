<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">


<body>

<div th:replace="~{layout-admin :: layout(~{::content})}">

<div th:fragment="content">

<h1>Editar Pel·lícula</h1>

<form th:action="@{/movies/edit}" th:object="${movie}" method="post">

<input type="hidden" th:field="*{id}">

<label>Títol</label>
<input type="text" th:field="*{title}">
<br><br>

<label>Durada (min)</label>
<input type="number" th:field="*{duration}">
<br><br>

<label>Gènere</label>
<input type="text" th:field="*{genre}">
<br><br>

<label>Descripció</label>
<textarea th:field="*{sinopsis}"></textarea>
<br><br>

<label>Imatge (URL o ruta)</label>
<input type="text" th:field="*{posterUrl}" placeholder="/images/peliculas/ironman.jpg">
<br><br>

<label>Data Estrena</label>
<input type="date" th:field="*{releaseDate}">
<br><br>

<button type="submit">Guardar</button>

</form>

<br>

<a th:href="@{/movies}">Tornar</a>

</div>

</div>

</body>
</html>
