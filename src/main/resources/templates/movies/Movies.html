    <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Pel·lícules</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<h1>Llista de Pel·lícules</h1>


<a th:href="@{/movies/create}">Crear pel·lícula</a>

<table border="1">
    <tr>
        <th>Title</th>
        <th>Duration</th>
        <th>Genre</th>
        <th>Release Date</th>
        <th>Actions</th>
    </tr>

    <tr th:each="movie : ${movies}">
        <td th:text="${movie.title}"></td>
        <td th:text="${movie.duration}"></td>
        <td th:text="${movie.genre}"></td>
        <td th:text="${movie.releaseDate}"></td>
        <td>
            <a th:href="@{/movies/{id}(id=${movie.id})}">View</a>
            <a th:href="@{/movies/edit/{id}(id=${movie.id})}">Edit</a>
        </td>
    </tr>
</table>

<a href="/">Tornar</a>

</body>
</html>
